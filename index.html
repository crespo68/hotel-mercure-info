<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e5e7eb;
  }

  header {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 25px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .container {
    max-width: 750px;
    margin: auto;
    padding: 20px;
  }

  .lang {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 25px 0;
  }

  .lang button {
    padding: 10px 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    color: #e5e7eb;
    font-weight: bold;
    transition: 0.2s;
    backdrop-filter: blur(10px);
  }

  .lang button:hover {
    background: rgba(255,255,255,0.18);
    transform: scale(1.05);
  }

  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 18px;
    margin-bottom: 15px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.09);
  }

  .title {
    font-size: 18px;
    margin-bottom: 10px;
    font-weight: bold;
    color: #ffffff;
  }

  .card div {
    line-height: 1.6;
    color: #cbd5e1;
    font-size: 15px;
  }

  .footer {
    text-align: center;
    margin-top: 30px;
    font-size: 12px;
    opacity: 0.6;
  }
</style>
