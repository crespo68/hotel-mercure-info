<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Mercure</title>

<style>
:root {
  --bg: #0b1220;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #e5e7eb;
  --text2: #cbd5e1;
}

/* 🌞 LIGHT MODE AUTOMATIC */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --text2: #374151;
  }
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  background: var(--bg);
  padding: 18px;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

/* CONTAINER */
.container {
  max-width: 720px;
  margin: auto;
  padding: 15px;
}

/* LANG BUTTONS */
.lang {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin: 18px 0 25px;
}

.lang button {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.lang button:hover {
  transform: scale(1.05);
}

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

.title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
}

.content {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text2);
}
</style>
</head>

<body>

<header>🏨 Hotel Mercure</header>

<div class="container">

  <!-- LANG -->
  <div class="lang">
    <button onclick="setLang('ca')">Català</button>
    <button onclick="setLang('es')">Español</button>
    <button onclick="setLang('fr')">Français</button>
    <button onclick="setLang('en')">English</button>
  </div>

  <!-- CARDS -->
  <div class="card">
    <div class="title" id="t1"></div>
    <div class="content" id="reception"></div>
  </div>

  <div class="card">
    <div class="title" id="t2"></div>
    <div class="content" id="spa"></div>
  </div>

  <div class="card">
    <div class="title" id="t3"></div>
    <div class="content" id="food"></div>
  </div>

  <div class="card">
    <div class="title" id="t4"></div>
    <div class="content" id="wifi"></div>
  </div>

  <div class="card">
    <div class="title" id="t5"></div>
    <div class="content" id="checkout"></div>
  </div>

</div>

<script>

function setLang(lang){

const data = {
 ca:{
  t1:"Recepció 24H 📞 750",

  t2:"SPA 📞 647",

  t3:"Restauració",
  food:"🥐 Esmorzar: 07:30 - 11:00<br>🍽️ Dinar: 13:00 - 15:30<br>🍷 Sopar: 20:00 - 22:30",

  t4:"WiFi",
  wifi:"PRESTIGIHOTEL<br>🔑 prestigi",

  t5:"Check-out",
  checkout:"12:00"
 },

 es:{
  t1:"Recepción 24H 📞 750",

  t2:"SPA 📞 647",
  spa:"Jacuzzi · Gimnasio · Piscina · Sauna<br>10:00 - 13:00 / 17:00 - 21:00<br>",

  t3:"Restauración",
  food:"🥐 Desayuno: 07:30 - 11:00<br>🍽️ Comida: 13:00 - 15:30<br>🍷 Cena: 20:00 - 22:30",

  t4:"WiFi",
  wifi:"PRESTIGIHOTEL<br>🔑 prestigi",

  t5:"Check-out",
  checkout:"12:00"
 },

 fr:{
  t1:"Réception 24H 📞 750",
  
  t2:"SPA 📞 647",
  spa:"Jacuzzi · Gym · Piscine · Sauna<br>10:00 - 13:00 / 17:00 - 21:00<br>",

  t3:"Restauration",

  t4:"WiFi",

  t5:"Check-out",
  checkout:"12:00"

  t3:"Dining",

 }
};

let t = data[lang];

document.getElementById("t1").innerHTML = t.t1;
document.getElementById("reception").innerHTML = t.reception;

document.getElementById("t2").innerHTML = t.t2;
document.getElementById("spa").innerHTML = t.spa;

document.getElementById("t3").innerHTML = t.t3;
document.getElementById("food").innerHTML = t.food;

document.getElementById("t4").innerHTML = t.t4;
document.getElementById("wifi").innerHTML = t.wifi;

document.getElementById("t5").innerHTML = t.t5;
document.getElementById("checkout").innerHTML = t.checkout;

}

// default language
setLang("ca");

</script>

</body>
</html>
