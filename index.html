<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Info</title>

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --text2:#cbd5e1;
}

@media (prefers-color-scheme: light){
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --text2:#374151;
}
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:700;
  border-bottom:1px solid var(--border);
}

/* CONTAINER */
.container{
  max-width:720px;
  margin:auto;
  padding:15px;
}

/* HOME */
.home{
  text-align:center;
  margin-top:40px;
}

.hotelBtn{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

/* LANG */
.lang{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin:15px 0 25px;
}

.lang button{
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  padding:8px 12px;
  border-radius:999px;
  font-weight:600;
  cursor:pointer;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 16px;
  margin-bottom:12px;
}

.title{
  font-size:15px;
  font-weight:700;
  margin-bottom:6px;
}

.content{
  font-size:14px;
  line-height:1.5;
  color:var(--text2);
}

/* HIDE */
.hidden{display:none;}
</style>
</head>

<body>

<header id="header">🏨 Hotel Info</header>

<div class="container">

<!-- HOME -->
<div id="home">
  <h2 style="text-align:center;">Selecciona hotel</h2>

  <button class="hotelBtn" onclick="selectHotel('mercure')">🏨 Hotel Mercure</button>
  <button class="hotelBtn" onclick="selectHotel('novotel')">🏨 Hotel Novotel</button>
  <button class="hotelBtn" onclick="selectHotel('andorra')">🏨 Andorra Palace</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="lang">
    <button onclick="setLang('ca')">Català</button>
    <button onclick="setLang('es')">Español</button>
    <button onclick="setLang('fr')">Français</button>
    <button onclick="setLang('en')">English</button>
  </div>

  <div class="card">
    <div class="title">📞 Recepció</div>
    <div class="content" id="reception"></div>
  </div>

  <div class="card">
    <div class="title">🧖 SPA</div>
    <div class="content">
      Jacuzzi · Gimnàs · Piscina · Sauna<br>
      10:00 - 13:00 / 17:00 - 21:00
    </div>
  </div>

  <div class="card">
    <div class="title">🍽️ Restauració</div>
    <div class="content">
      Esmorzar 07:30 - 11:00<br>
      Dinar 13:00 - 15:30<br>
      Sopar 20:00 - 22:30
    </div>
  </div>

  <div class="card">
    <div class="title">📶 WiFi</div>
    <div class="content">
      PRESTIGIHOTEL<br>
      🔑 prestigi
    </div>
  </div>

  <div class="card">
    <div class="title">🚪 Check-out</div>
    <div class="content">12:00</div>
  </div>

</div>

</div>

<script>

let hotels = {
  mercure: { phone: "750" },
  novotel: { phone: "720" },
  andorra: { phone: "701" }
};

let currentHotel = "mercure";

function selectHotel(hotel){
  currentHotel = hotel;

  document.getElementById("home").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("header").innerText =
    "🏨 " + hotel.toUpperCase().replace("_"," ");

  updateData();
}

function updateData(){
  document.getElementById("reception").innerHTML =
    "📞 " + hotels[currentHotel].phone;
}

function setLang(lang){
  // no necesario aquí (todo fijo excepto idiomas si quieres ampliarlo después)
}

</script>

</body>
</html>
