<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Info</title>

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --text2:#cbd5e1;
}

@media (prefers-color-scheme: light){
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --text2:#374151;
}
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:700;
  border-bottom:1px solid var(--border);
}

.container{
  max-width:720px;
  margin:auto;
  padding:15px;
}

/* HOME */
.hotelBtn{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

/* LANG */
.lang{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin:15px 0 25px;
}

.lang button{
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  padding:8px 12px;
  border-radius:999px;
  font-weight:600;
  cursor:pointer;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 16px;
  margin-bottom:12px;
}

.title{
  font-size:15px;
  font-weight:700;
  margin-bottom:6px;
}

.content{
  font-size:14px;
  line-height:1.5;
  color:var(--text2);
}

/* HIDE */
.hidden{display:none;}
</style>
</head>

<body>

<header id="header">🏨 Hotel Info</header>

<div class="container">

<!-- HOME -->
<div id="home">
  <h2 style="text-align:center;">Selecciona hotel</h2>

  <button class="hotelBtn" onclick="selectHotel('mercure')">🏨 Hotel Mercure</button>
  <button class="hotelBtn" onclick="selectHotel('novotel')">🏨 Hotel Novotel</button>
  <button class="hotelBtn" onclick="selectHotel('andorra')">🏨 Andorra Palace</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="lang">
    <button onclick="setLang('ca')">Català</button>
    <button onclick="setLang('es')">Español</button>
    <button onclick="setLang('fr')">Français</button>
    <button onclick="setLang('en')">English</button>
  </div>

  <!-- RECEPCIÓN -->
  <div class="card">
    <div class="title">📞 Recepció</div>
    <div class="content">
      <div id="receptionPhone"></div>
      <div id="receptionText"></div>
    </div>
  </div>

  <div class="card">
    <div class="title">🧖 SPA 📞 647</div>
    <div class="content" id="spa"></div>
  </div>

  <div class="card">
    <div class="title">🍽️ Restauració</div>
    <div class="content" id="food"></div>
  </div>

  <div class="card">
    <div class="title">📶 WiFi</div>
    <div class="content" id="wifi"></div>
  </div>

  <div class="card">
    <div class="title">🚪 Check-out</div>
    <div class="content" id="checkout"></div>
  </div>

</div>

</div>

<script>

let hotels = {
  mercure: "750",
  novotel: "720",
  andorra: "701"
};

let hotelNames = {
  mercure: "Hotel Mercure",
  novotel: "Hotel Novotel",
  andorra: "Andorra Palace"
};

let langData = {
 ca:{
  reception:"Si teniu preguntes o necessiteu ajuda",
  spa:"Jacuzzi · Gimnàs · Piscina · Sauna<br>10:00 - 13:00 / 17:00 - 21:00",
  food:"🥐 Esmorzar 07:30-11:00<br>🍽️ Dinar 13:00-15:30<br>🍷 Sopar 20:00-22:30",
  wifi:"PRESTIGIHOTEL<br>🔑 prestigi",
  checkout:"12:00"
 },
 es:{
  reception:"Si tiene preguntas o necesita ayuda",
  spa:"Jacuzzi · Gimnasio · Piscina · Sauna<br>10:00 - 13:00 / 17:00 - 21:00",
  food:"🥐 Desayuno 07:30-11:00<br>🍽️ Comida 13:00-15:30<br>🍷 Cena 20:00-22:30",
  wifi:"PRESTIGIHOTEL<br>🔑 prestigi",
  checkout:"12:00"
 },
 fr:{
  reception:"Si vous avez des questions ou besoin d'aide",
  spa:"Jacuzzi · Gym · Piscine · Sauna<br>10:00 - 13:00 / 17:00 - 21:00",
  food:"Petit-déj 07:30-11:00<br>Déj 13:00-15:30<br>Dîner 20:00-22:30",
  wifi:"PRESTIGIHOTEL<br>🔑 prestigi",
  checkout:"12:00"
 },
 en:{
  reception:"If you have questions or need help",
  spa:"Jacuzzi · Gym · Pool · Sauna<br>10:00 - 13:00 / 17:00 - 21:00",
  food:"Breakfast 07:30-11:00<br>Lunch 13:00-15:30<br>Dinner 20:00-22:30",
  wifi:"PRESTIGIHOTEL<br>🔑 prestigi",
  checkout:"12:00"
 }
};

let currentHotel = "mercure";
let currentLang = "ca";

function selectHotel(hotel){
  currentHotel = hotel;

  document.getElementById("home").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("header").innerText =
    "🏨 " + hotelNames[hotel];

  update();
}

function setLang(lang){
  currentLang = lang;
  update();
}

function update(){

  document.getElementById("receptionPhone").innerHTML =
    "📞 24H " + hotels[currentHotel];

  document.getElementById("receptionText").innerHTML =
    langData[currentLang].reception;

  document.getElementById("spa").innerHTML =
    langData[currentLang].spa;

  document.getElementById("food").innerHTML =
    langData[currentLang].food;

  document.getElementById("wifi").innerHTML =
    langData[currentLang].wifi;

  document.getElementById("checkout").innerHTML =
    langData[currentLang].checkout;
}

</script>

</body>
</html>
